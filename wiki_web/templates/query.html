{% extends "base.html" %}
{% block title %}질문 — llm-wiki{% endblock %}

{% block content %}
<div class="page-header">
  <h1>질문 답변</h1>
  <p>위키에 수록된 문서를 바탕으로 LLM이 답변합니다.</p>
</div>

<!-- 입력 카드 -->
<div class="card" style="margin-bottom:20px">
  <div class="card-body">
    <form id="query-form"
          hx-post="/query"
          hx-target="#query-result-area"
          hx-swap="innerHTML">
      <div class="form-field">
        <label class="form-label">질문</label>
        <textarea class="form-textarea" name="question" rows="3" required id="query-input"
                  placeholder="예: 어텐션 메커니즘이란 무엇인가요? BERT와 GPT의 차이점은?"
                  style="font-size:14px; min-height:90px"></textarea>
      </div>
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-top:12px">
        <label class="btn btn-ghost btn-sm" style="cursor:pointer; gap:7px; font-weight:400; color:var(--text-muted)">
          <input type="checkbox" name="save" value="true" id="query-save-chk"
                 style="width:13px; height:13px; accent-color:var(--accent); cursor:pointer; margin:0">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          synthesis/ 에 자동 저장
        </label>
        <div style="display:flex; align-items:center; gap:10px">
          <span id="query-spinner" class="htmx-indicator" style="font-size:12.5px; color:var(--text-muted)">
            <span class="step-spin"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></span> 답변 생성 중...
          </span>
          <button class="btn btn-primary" type="submit" id="query-submit-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            답변 생성
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<div id="query-result-area"></div>

<style>
  .query-progress-panel { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .query-progress-header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .query-progress-header .q-title {
    font-weight: 600; font-size: 13.5px; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .query-progress-header .q-timer { font-size: 12px; color: var(--text-muted); }

  .query-step-list { list-style: none; margin: 0; padding: 6px 0; background: var(--bg-card); }
  .query-step-list li {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 7px 16px;
    font-size: 13px; color: var(--text-muted);
    border-left: 3px solid transparent;
    transition: border-color 0.2s, color 0.2s;
  }
  .query-step-list li.step-active { border-left-color: var(--accent); color: var(--text); background: rgba(59,130,246,0.04); }
  .query-step-list li.step-done   { border-left-color: var(--success); color: #22c55e; }
  .query-step-list li.step-error  { border-left-color: var(--error);   color: var(--error); }
  .step-icon { flex-shrink: 0; width: 1em; text-align: center; }

  .query-result-card { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; animation: slideUp 0.25s ease; }
  .query-result-card .result-header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 12px 18px;
    font-size: 13.5px; font-weight: 600;
  }
  .query-result-card .result-body { padding: 20px 18px; }
  .query-result-card .result-footer {
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    padding: 10px 18px;
  }
</style>

<script>
  const queryForm = document.getElementById('query-form');
  queryForm.addEventListener('htmx:beforeRequest', () => {
    const btn = document.getElementById('query-submit-btn');
    btn.disabled = true;
    btn.setAttribute('aria-busy', 'true');
  });
  document.addEventListener('htmx:afterRequest', () => {
    const btn = document.getElementById('query-submit-btn');
    if (btn) { btn.disabled = false; btn.removeAttribute('aria-busy'); }
  });
</script>
{% endblock %}
