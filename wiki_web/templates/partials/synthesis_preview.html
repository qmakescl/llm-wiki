<!-- synthesis 문서 미리보기 (HTMX 부분 렌더링) -->
<div style="padding:20px 24px">
<header style="display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; flex-wrap:wrap">
  <div>
    <h2 style="margin:0 0 0.25rem">{{ title }}</h2>
    {% if created %}
    <small style="display:inline-flex; align-items:center; gap:4px; color:var(--text-muted)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      {{ created }}
    </small>
    {% endif %}
  </div>
  <button class="btn btn-danger btn-sm synth-delete-btn"
          hx-delete="/synthesis/{{ slug }}"
          hx-target="#synth-item-{{ slug }}"
          hx-swap="outerHTML"
          hx-confirm="이 문서를 삭제하시겠습니까?"
          hx-on::after-request="document.getElementById('synthesis-preview').innerHTML = '<div style=\'display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:var(--text-muted);gap:0.5rem;font-size:13.5px\'><p style=\'margin:0\'>삭제되었습니다.</p></div>'"
          style="flex-shrink:0">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    삭제
  </button>
</header>

<hr style="margin:0.75rem 0">

<div class="answer-body synthesis-body">
  {{ answer_html | safe }}
</div>
</div>
