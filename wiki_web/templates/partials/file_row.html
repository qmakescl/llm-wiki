<div id="file-{{ f.slug }}" style="display:flex; align-items:center; justify-content:space-between;
     padding:10px 18px; border-bottom:1px solid var(--border); gap:12px">
  <div style="flex:1; min-width:0">
    <div style="font-size:13.5px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">
      {{ f.name }}
    </div>
    <div style="font-size:12px; color:var(--text-muted); margin-top:2px">{{ f.size }}</div>
  </div>

  {% if f.ingested %}
  <span class="badge badge-success">완료 <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
  {% else %}
  <div id="ingest-ctrl-{{ f.slug }}" style="display:flex; align-items:center; gap:8px">
    {% if f.partial %}
    <span class="badge badge-warning">미완료</span>
    {% endif %}
    <button class="btn btn-secondary btn-sm"
            hx-post="/documents/ingest/{{ f.slug }}"
            hx-target="#ingest-ctrl-{{ f.slug }}"
            hx-swap="outerHTML"
            hx-indicator="#spin-{{ f.slug }}">
      {% if f.partial %}다시 Ingest{% else %}추출{% endif %}
    </button>
    <span id="spin-{{ f.slug }}" class="htmx-indicator" style="font-size:12px; color:var(--text-muted)">
      <span class="step-spin"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></span> 시작 중...
    </span>
  </div>
  {% endif %}
</div>
